<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Club Ajedrez Telde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrapper" id="loginScreen">
    <div class="login-card">
      <div class="login-logo"><img src="img/logo.jpg" alt="Logo"></div>
      <h1>Panel de Administración</h1>
      <p class="subtitle">Club-Escuela de Ajedrez Telde Los Llanos</p>
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" required>
        <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn">Iniciar Sesión</button>
        <p class="login-error" id="loginError">Usuario o contraseña incorrectos</p>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-layout" id="adminPanel" style="display:none">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="img/logo.jpg" alt="Logo">
        <span>Admin Panel</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active">
          <svg viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          Entradas
        </a>
        <a href="index.html" target="_blank">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Ver Web
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="#" id="logoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Entradas del Blog</h1>
        <button class="btn-new" id="btnNew">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva Entrada
        </button>
      </div>

      <div id="entriesList"></div>
    </main>
  </div>

  <!-- EDITOR OVERLAY -->
  <div class="editor-overlay" id="editorOverlay">
    <div class="editor-card">
      <div class="editor-header">
        <h2 id="editorTitle">Nueva Entrada</h2>
        <button class="btn-close" id="btnCloseEditor">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="entryForm">
        <input type="hidden" id="entryId">
        <div class="form-group">
          <label for="entryTitleInput">Título</label>
          <input type="text" id="entryTitleInput" placeholder="Título de la entrada" required>
        </div>
        <div class="form-group">
          <label for="entryDate">Fecha</label>
          <input type="date" id="entryDate" required>
        </div>
        <div class="form-group">
          <label for="entryContent">Contenido</label>
          <textarea id="entryContent" placeholder="Escribe el contenido de la entrada..." required></textarea>
        </div>
        <div class="form-group">
          <label>Imágenes</label>
          <div class="image-upload-area" id="uploadArea">
            <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Arrastra imágenes aquí o <span>selecciona archivos</span></p>
            <input type="file" id="imageInput" accept="image/*" multiple>
          </div>
          <div class="image-previews" id="imagePreviews"></div>
        </div>
        <div class="editor-actions">
          <button type="button" class="btn-cancel" id="btnCancelEditor">Cancelar</button>
          <button type="submit" class="btn-save">Guardar Entrada</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-card">
      <h3>Eliminar entrada</h3>
      <p>¿Estás seguro? Esta acción no se puede deshacer.</p>
      <div class="confirm-actions">
        <button class="btn-cancel" id="btnCancelDelete">Cancelar</button>
        <button class="btn-confirm-delete" id="btnConfirmDelete">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
